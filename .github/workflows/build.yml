name: Build NetHunter Kernel A530F - Stable

on:
  workflow_dispatch: # تشغيل يدوي للتحكم الكامل

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          # تثبيت كل المتطلبات دفعة واحدة لإصلاح خطأ 127
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          libgl1-mesa-dev libx11-dev libncurses5-dev xsltproc unzip python3-pip ccache bc libssl-dev libelf-dev

      - name: Toolchain Setup
        run: |
          # استخدام Toolchain ثابت لتجنب مشاكل التوافق
          git clone --depth=1 https://github.com/arter97/arm64-gcc.git toolchain

      - name: Clone Kernel Source (New Target)
        run: |
          # استخدام سورس Neternels العام لتجنب خطأ 128
          git clone --depth=1 https://github.com/Neternels/Nethunter-Kernel-Exynos7885-QRS.git kernel

      - name: Build and Enable Mass Storage
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-gnu-
          
          # إعداد ملف defconfig الصحيح للجهاز
          make O=out Neternels-a10_defconfig
          
          # --- تفعيل Mass Storage و NetHunter برمجياً ---
          scripts/config --file out/.config --enable CONFIG_USB_STORAGE
          scripts/config --file out/.config --enable CONFIG_BLK_DEV_SD
          scripts/config --file out/.config --enable CONFIG_USB_F_MASS_STORAGE
          scripts/config --file out/.config --enable CONFIG_WLAN
          
          # بدء البناء
          make O=out -j$(nproc --all)

      - name: Create Flashable ZIP
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
          cd AnyKernel3
          # تحديد هوية الجهاز (jackpotlte) لضمان القبول في TWRP
          sed -i 's/device.name1=/device.name1=jackpotlte/g' anykernel.sh
          zip -r ../NetHunter-Kernel-A530F.zip *

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Kernel-A530F
          path: NetHunter-Kernel-A530F.zip
