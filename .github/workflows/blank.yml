name: Build NetHunter Kernel

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # --- تم إضافة ccache هنا لإصلاح الخطأ ---
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          libgl1-mesa-dev libx11-dev libncurses5-dev xsltproc unzip python3-pip ccache bc libssl-dev libelf-dev

      - name: Setup Toolchain
        run: |
          git clone --depth=1 https://github.com/arter97/arm64-gcc.git toolchain

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/Neternels/Nethunter-Kernel-Exynos7885-QRS.git kernel

      - name: Build Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-gnu-
          
          # إعداد النواة
          make O=out Neternels-a10_defconfig
          
          # --- تفعيل Mass Storage و Driver الأساسية ---
          echo "CONFIG_USB_STORAGE=y" >> out/.config
          echo "CONFIG_BLK_DEV_SD=y" >> out/.config
          echo "CONFIG_USB_SUPPORT=y" >> out/.config
          echo "CONFIG_USB=y" >> out/.config

          # تفعيل باقي الإعدادات الخاصة بك
          scripts/config --file out/.config --enable CONFIG_WLAN
          scripts/config --file out/.config --enable CONFIG_MAC80211
          scripts/config --file out/.config --enable CONFIG_CFG80211
          scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          
          # بناء النواة
          make O=out -j$(nproc --all)

      - name: Package Kernel
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
          cd AnyKernel3
          sed -i 's/device.name1=/device.name1=jackpotlte/g' anykernel.sh
          zip -r ../NetHunter-Kernel-AB-2010.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-ZIP-Final
          path: NetHunter-Kernel-AB-2010.zip
